minimum_pre_commit_version = "4.0.0"

repos = [
  { repo = "local", hooks = [
    { id = "ruff", name = "ruff", entry = "./.venv/bin/ruff", language = "system", types = ["python"], args = ["check", "--fix"] },
    { id = "ruff-format", name = "ruff-format", entry = "./.venv/bin/ruff", language = "system", types = ["python"], args = ["format"] },
    { id = "mypy", name = "mypy", entry = "./.venv/bin/mypy", language = "system", pass_filenames = false, args = ["app/src", "custom_components", "tests"] },
    { id = "pytest", name = "pytest", entry = "./.venv/bin/pytest", language = "system", pass_filenames = false },
  ] },
]
