name: Lost Apple
version: 0.1.0
slug: lost_apple
description: Home Assistant App for Apple Find My device discovery.
url: https://github.com/snuffy2/hass-lost-apple
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:map-marker-radius
homeassistant_api: true
ports:
  8099/tcp: null
map:
  - type: addon_config
    read_only: false
options:
  pairing_token: ""
schema:
  pairing_token: password
image: ghcr.io/snuffy2/hass-lost-apple-{arch}
