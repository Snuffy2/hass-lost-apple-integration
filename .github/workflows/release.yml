name: Release Lost Apple Integration

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Integration version to package
        required: true
        type: string
  release:
    types: [published, edited]

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}

jobs:
  release-assets:
    name: Build integration release asset
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref }}

      - name: Resolve release version
        run: |
          release_version="${RELEASE_TAG#v}"
          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"

      - name: Debug GitHub Variables
        run: |
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.event.release.tag_name: ${{ github.event.release.tag_name }}"
          echo "github.event.repository.default_branch: ${{ github.event.repository.default_branch }}"
          echo "github.event.release.target_commitish: ${{ github.event.release.target_commitish }}"
          echo "github.event.release.prerelease: ${{ github.event.release.prerelease }}"
          echo "github.event.release.draft: ${{ github.event.release.draft }}"
          echo "RELEASE_TAG: ${RELEASE_TAG}"
          echo "RELEASE_VERSION: ${RELEASE_VERSION}"

      - name: Update Lost Apple Integration versions
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.draft == false }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import re

          version = os.environ["RELEASE_VERSION"]

          const_path = Path("custom_components/lost_apple/const.py")
          const_text = const_path.read_text()
          const_text, replacement_count = re.subn(
              r'^VERSION: Final = "[^"]*"$',
              f'VERSION: Final = "{version}"',
              const_text,
              count=1,
              flags=re.MULTILINE,
          )
          if replacement_count != 1:
              raise SystemExit("Unable to update VERSION in const.py")
          const_path.write_text(const_text)

          manifest_path = Path("custom_components/lost_apple/manifest.json")
          manifest = json.loads(manifest_path.read_text())
          manifest["version"] = version
          manifest_path.write_text(f"{json.dumps(manifest, indent=2)}\n")
          PY

      - name: Create Lost Apple Integration zip
        run: |
          cd "${{ github.workspace }}/custom_components/lost_apple"
          zip lost_apple.zip -r ./

      - name: Upload Lost Apple Integration zip to Release
        if: ${{ github.event_name == 'release' && github.event.release.draft == false }}
        uses: softprops/action-gh-release@v3
        with:
          files: ./custom_components/lost_apple/lost_apple.zip
          tag_name: ${{ env.RELEASE_TAG }}

      - name: Add Lost Apple Integration zip to Action
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v7
        with:
          name: lost_apple
          path: ./custom_components/lost_apple/lost_apple.zip
          if-no-files-found: error
