name: Release Home Assistant App Images

on:
  push:
    branches:
      - initial-development
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release-app-images:
    name: Build and publish Home Assistant App image
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/initial-development' ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Home Assistant App image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/lost_apple/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
          tags: ghcr.io/snuffy2/hass-lost-apple-${{ matrix.arch }}:latest
          pull: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
